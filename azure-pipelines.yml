trigger:
- main

variables:
- group: terraform-secrets

stages:

- stage: Dev
  jobs:
  - template: templates/terraform-deploy.yml
    parameters:
      environment: dev

- stage: ApproveUAT
  dependsOn: Dev
  jobs:
  - template: templates/manual-approval.yml
    parameters:
      instructions: Approve deployment to UAT

- stage: UAT
  dependsOn: ApproveUAT
  jobs:
  - template: templates/terraform-deploy.yml
    parameters:
      environment: uat

- stage: ApproveProd
  dependsOn: UAT
  jobs:
  - template: templates/manual-approval.yml
    parameters:
      instructions: Approve deployment to Production

- stage: Prod
  dependsOn: ApproveProd
  jobs:
  - template: templates/terraform-deploy.yml
    parameters:
      environment: prod