trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  terraformVersion: '1.5.0'


steps:
- checkout: self

# Debug (optional but recommended)
- script: |
    echo "Root:"
    ls -la
    echo "Infra folder:"
    ls -la infra
  displayName: "Check files"

- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'terraform-secret'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'terraform-secret'
    environmentAzureRmOverrideSubscriptionID: '6349a94a-bcc7-4da7-8f36-2f6bc3017bf7'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    environmentServiceNameAzureRM: 'terraform-secret'
    environmentAzureRmOverrideSubscriptionID: '6349a94a-bcc7-4da7-8f36-2f6bc3017bf7'