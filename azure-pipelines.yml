trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: terraform-secrets

stages:

# ================= DEV =================
- stage: Dev
  jobs:
  - job: DeployDev
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.6.6'

    - task: TerraformTaskV4@4
      displayName: Terraform Init Dev
      inputs:
        provider: azurerm
        command: init
        workingDirectory: infra
        backendServiceArm: terraform-secret
        backendAzureRmResourceGroupName: tf-backend-rg
        backendAzureRmStorageAccountName: tfstate12345demomilan245
        backendAzureRmContainerName: tfstate-dev
        backendAzureRmKey: dev.terraform.tfstate

    - task: TerraformTaskV4@4
      displayName: Terraform Plan Dev
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: infra
        environmentServiceNameAzureRM: terraform-secret
        commandOptions: >
          -var="environment=dev"
          -var-file=dev.tfvars
          -out=tfplan
      env:
        TF_VAR_vm_password: $(vm-password)

    - task: TerraformTaskV4@4
      displayName: Terraform Apply Dev
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: infra
        environmentServiceNameAzureRM: terraform-secret
        commandOptions: tfplan
      env:
        TF_VAR_vm_password: $(vm-password)

# ================= UAT =================
- stage: UAT
  dependsOn: Dev
  condition: succeeded()
  jobs:
  - deployment: DeployUAT
    environment: uat-approval
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.6.6'

          - task: TerraformTaskV4@4
            displayName: Terraform Init UAT
            inputs:
              provider: azurerm
              command: init
              workingDirectory: infra
              backendServiceArm: terraform-secret
              backendAzureRmResourceGroupName: tf-backend-rg
              backendAzureRmStorageAccountName: tfstate12345demomilan245
              backendAzureRmContainerName: tfstate-uat
              backendAzureRmKey: uat.terraform.tfstate

          - task: TerraformTaskV4@4
            displayName: Terraform Plan UAT
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: infra
              environmentServiceNameAzureRM: terraform-secret
              commandOptions: >
                -var="environment=uat"
                -var-file=uat.tfvars
                -out=tfplan
            env:
              TF_VAR_vm_password: $(vm-password)

          - task: TerraformTaskV4@4
            displayName: Terraform Apply UAT
            inputs:
              provider: azurerm
              command: apply
              workingDirectory: infra
              environmentServiceNameAzureRM: terraform-secret
              commandOptions: tfplan
            env:
              TF_VAR_vm_password: $(vm-password)

# ================= PROD =================
- stage: Prod
  dependsOn: UAT
  condition: succeeded()
  jobs:
  - deployment: DeployProd
    environment: prod-approval
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.6.6'

          - task: TerraformTaskV4@4
            displayName: Terraform Init Prod
            inputs:
              provider: azurerm
              command: init
              workingDirectory: infra
              backendServiceArm: terraform-secret
              backendAzureRmResourceGroupName: tf-backend-rg
              backendAzureRmStorageAccountName: tfstate12345demomilan245
              backendAzureRmContainerName: tfstate-prod
              backendAzureRmKey: prod.terraform.tfstate

          - task: TerraformTaskV4@4
            displayName: Terraform Plan Prod
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: infra
              environmentServiceNameAzureRM: terraform-secret
              commandOptions: >
                -var="environment=prod"
                -var-file=prod.tfvars
                -out=tfplan
            env:
              TF_VAR_vm_password: $(vm-password)

          - task: TerraformTaskV4@4
            displayName: Terraform Apply Prod
            inputs:
              provider: azurerm
              command: apply
              workingDirectory: infra
              environmentServiceNameAzureRM: terraform-secret
              commandOptions: tfplan
            env:
              TF_VAR_vm_password: $(vm-password)