trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

# Install Terraform
- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.6.6'

# Terraform Init with Remote Backend
- task: TerraformTaskV4@4
  displayName: "Terraform Init"
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: 'infra'
    backendServiceArm: 'terraform-secret'   # service connection
    backendAzureRmResourceGroupName: 'tf-backend-rg'
    backendAzureRmStorageAccountName: 'tfstate12345demomilan245'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'terraform.tfstate'

# Terraform Plan
- task: TerraformTaskV4@4
  displayName: "Terraform Plan"
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: 'infra'
    environmentServiceNameAzureRM: 'terraform-secret'
    commandOptions: '-var-file=uat.tfvars -out=tfplan'

# Terraform Apply
- task: TerraformTaskV4@4
  displayName: "Terraform Apply"
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: 'infra'
    environmentServiceNameAzureRM: 'terraform-secret'